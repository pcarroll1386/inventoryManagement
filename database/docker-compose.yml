# Use root/example as user/password credentials
version: '3.1'

services:

  Inventorydb:
    image: mariadb
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mypasswd
    volumes: 
      - ./mariadb-data:/var/lib/mysql
      - "/etc/localtime:/etc/localtime:ro"